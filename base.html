<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}PVC App{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS (v5) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    >

    <!-- Font Awesome (optional) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      body {
        font-size: 12px;
      }
      .container {
        max-width: 1000px;
      }
      .card-body {
        padding: 0.5rem 0.75rem;
      }
      .card-header {
        padding: 0.4rem 0.75rem;
      }
      .card-header h5,
      .card-header h6,
      .alert h4 {
        font-size: 14px;
        margin-bottom: 0;
      }
      table.table-sm th,
      table.table-sm td {
        padding: 0.15rem 0.35rem;
      }
      .row.mb-4 {
        margin-bottom: 0.75rem !important;
      }
      .mb-4 {
        margin-bottom: 0.75rem !important;
      }
      .mb-2 {
        margin-bottom: 0.35rem !important;
      }
      .alert {
        padding: 0.4rem 0.75rem;
        margin-bottom: 0.6rem;
      }
      h4, h5, h6 {
        margin: 0;
      }
      .card-body h4,
      .card-body h5 {
        font-size: 14px;
      }
      .card-body small {
        font-size: 11px;
      }
      .badge {
        font-size: 10px;
        padding: 0.15em 0.4em;
      }
      .hide-print {
        /* use on heavy sections you want to hide when printing */
      }

      /* Page size for printing */
      @page {
        size: A4 portrait;
        margin: 10mm 8mm;
      }

      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          font-size: 11px;
        }

        .btn,
        .alert,
        .navbar {
          display: none !important;
        }

        .container {
          max-width: 100%;
          margin: 0;
          padding: 0;
        }

        .card {
          margin-bottom: 4px !important;
          page-break-inside: avoid;
        }

        table {
          page-break-inside: avoid;
        }

        /* Keep logical page size within A4 so browser can fit 2 per sheet */
        html, body {
          width: 210mm;
          height: 297mm;
        }

        .hide-print {
          display: none !important;
        }
      }
    </style>

    {% block head %}{% endblock %}
  </head>
  <body>
    <!-- Optional navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-2">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">PVC App</a>
        <div class="d-flex">
          {% if current_user.is_authenticated %}
            <span class="navbar-text me-3">
              {{ current_user.username }}
            </span>
            <a class="btn btn-sm btn-outline-light" href="{{ url_for('logout') }}">Logout</a>
          {% endif %}
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
